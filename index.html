<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Quote Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Random Quote Generator</h1>
        
        <div class="quote-display">
            <p id="quote-text">Click the button to get an inspirational quote!</p>
        </div>
        
        <button id="new-quote-btn">Get New Quote</button>
        
        <div class="submit-section">
            <h2>Add Your Own Quote</h2>
            <input type="text" id="user-name-input" placeholder="Your name (optional)">
            <input type="text" id="user-quote-input" placeholder="Enter your inspirational quote here...">
            <button id="submit-quote-btn">Submit Quote</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
